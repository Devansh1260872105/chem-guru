<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chem Guru — Chemistry Puzzle Game</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --surface: #111827;
  --surface2: #1a2236;
  --accent: #00e5a0;
  --accent2: #00b8ff;
  --danger: #ff4d6d;
  --warning: #ffd60a;
  --text: #f0f4ff;
  --muted: #7a8caa;
  --border: rgba(255,255,255,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
  background-size: 40px 40px; pointer-events: none; z-index: 0;
}
.container { max-width: 480px; margin: auto; padding: 1.2rem 1rem 4rem; position: relative; z-index: 1; }

/* LANG SCREEN */
.lang-screen { text-align: center; padding: 2rem 0; animation: fadeIn 0.4s ease; }
.logo-big { font-family: 'Baloo 2', cursive; font-size: 36px; font-weight: 800; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px; }
.logo-sub { font-size: 13px; color: var(--muted); margin-bottom: 2rem; }
.lang-title { font-size: 15px; color: var(--muted); margin-bottom: 1rem; }
.lang-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
.lang-btn {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 10px;
  font-size: 15px; font-weight: 500; color: var(--text);
  cursor: pointer; transition: all 0.15s; text-align: center;
}
.lang-btn:hover, .lang-btn.selected { border-color: var(--accent); background: rgba(0,229,160,0.08); color: var(--accent); }
.start-btn {
  width: 100%; padding: 14px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border: none; border-radius: 14px;
  font-family: 'Baloo 2', cursive; font-size: 16px; font-weight: 700;
  color: #0a0e1a; cursor: pointer; transition: opacity 0.2s;
}
.start-btn:hover { opacity: 0.9; }
.start-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* HEADER */
.top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.logo { font-family: 'Baloo 2', cursive; font-size: 20px; font-weight: 800; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.top-right { display: flex; gap: 8px; align-items: center; }
.level-pill { font-size: 11px; font-weight: 600; letter-spacing: 1px; padding: 4px 10px; border-radius: 99px; border: 1px solid var(--accent); color: var(--accent); background: rgba(0,229,160,0.06); }
.timer-pill { font-size: 13px; font-weight: 700; padding: 4px 10px; border-radius: 99px; border: 1px solid var(--warning); color: var(--warning); background: rgba(255,214,10,0.06); font-family: 'Baloo 2', cursive; min-width: 52px; text-align: center; }
.timer-pill.danger { border-color: var(--danger); color: var(--danger); background: rgba(255,77,109,0.1); animation: pulse 0.5s infinite alternate; }

/* SCORE ROW */
.score-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; margin-bottom: 1rem; }
.score-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 8px 6px; text-align: center; }
.score-card .val { font-family: 'Baloo 2', cursive; font-size: 18px; font-weight: 700; }
.score-card .lbl { font-size: 9px; color: var(--muted); letter-spacing: 0.5px; margin-top: -2px; }
.score-card.s-correct .val { color: var(--accent); }
.score-card.s-wrong .val { color: var(--danger); }
.score-card.s-total .val { color: var(--accent2); }
.score-card.s-streak .val { color: var(--warning); }

/* PROGRESS */
.progress-wrap { margin-bottom: 1.2rem; }
.progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 5px; }
.progress-bg { height: 5px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 5px; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width 0.4s ease; }

/* QUESTION CARD */
.q-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 1.4rem; margin-bottom: 1rem; position: relative; overflow: hidden; animation: fadeIn 0.3s ease; }
.q-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
.q-tag { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.topic-badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 99px; background: rgba(0,184,255,0.1); color: var(--accent2); border: 1px solid rgba(0,184,255,0.2); margin-bottom: 10px; }
.reaction { font-family: 'Baloo 2', cursive; font-size: 26px; font-weight: 700; color: var(--text); text-align: center; margin: 8px 0 12px; letter-spacing: 1px; line-height: 1.3; }
.hint-box { background: var(--surface2); border-radius: 10px; padding: 10px 14px; font-size: 13px; color: var(--muted); border-left: 3px solid var(--accent2); line-height: 1.5; }
.hint-box strong { color: var(--accent2); }

/* OPTIONS */
.options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
.opt { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 10px; font-family: 'Baloo 2', cursive; font-size: 15px; font-weight: 600; color: var(--text); cursor: pointer; text-align: center; transition: all 0.15s; line-height: 1.3; }
.opt:hover { border-color: rgba(0,229,160,0.4); background: rgba(0,229,160,0.05); transform: translateY(-1px); }
.opt.correct { background: rgba(0,229,160,0.12); border-color: var(--accent); color: var(--accent); }
.opt.wrong { background: rgba(255,77,109,0.12); border-color: var(--danger); color: var(--danger); }

/* FEEDBACK */
.feedback { text-align: center; font-size: 14px; font-weight: 600; min-height: 24px; margin-bottom: 0.8rem; padding: 6px; border-radius: 8px; transition: all 0.2s; }
.feedback.correct { color: var(--accent); background: rgba(0,229,160,0.08); }
.feedback.wrong { color: var(--danger); background: rgba(255,77,109,0.08); }

/* STREAK POPUP */
.streak-popup { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: linear-gradient(90deg, var(--warning), #ff9500); color: #000; font-family: 'Baloo 2', cursive; font-size: 16px; font-weight: 700; padding: 10px 24px; border-radius: 99px; z-index: 100; animation: popIn 0.3s ease; display: none; }

/* NEXT BTN */
.next-btn { width: 100%; padding: 14px; background: linear-gradient(90deg, var(--accent), var(--accent2)); border: none; border-radius: 14px; font-family: 'Baloo 2', cursive; font-size: 16px; font-weight: 700; color: #0a0e1a; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
.next-btn:hover { opacity: 0.9; transform: translateY(-1px); }
.next-btn:disabled { opacity: 0.25; cursor: not-allowed; transform: none; }

/* LEADERBOARD */
.lb-screen { animation: fadeIn 0.4s ease; }
.lb-title { font-family: 'Baloo 2', cursive; font-size: 22px; font-weight: 800; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem; text-align: center; }
.lb-input-row { display: flex; gap: 8px; margin-bottom: 1rem; }
.lb-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; font-size: 14px; color: var(--text); outline: none; }
.lb-input:focus { border-color: var(--accent); }
.lb-save-btn { padding: 10px 18px; background: linear-gradient(90deg, var(--accent), var(--accent2)); border: none; border-radius: 10px; font-family: 'Baloo 2', cursive; font-weight: 700; font-size: 14px; color: #0a0e1a; cursor: pointer; }
.lb-table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
.lb-table th { font-size: 11px; color: var(--muted); text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); }
.lb-table td { font-size: 13px; padding: 10px 8px; border-bottom: 1px solid var(--border); color: var(--text); }
.lb-table tr:first-child td { color: var(--warning); font-weight: 600; }
.lb-table tr:nth-child(2) td { color: var(--muted); }
.lb-rank { font-family: 'Baloo 2', cursive; font-weight: 700; }
.play-again-btn { width: 100%; padding: 14px; background: transparent; border: 1px solid var(--accent); border-radius: 14px; font-family: 'Baloo 2', cursive; font-size: 16px; font-weight: 700; color: var(--accent); cursor: pointer; transition: all 0.2s; margin-top: 8px; }
.play-again-btn:hover { background: rgba(0,229,160,0.08); }

/* END SCREEN */
.end-screen { text-align: center; padding: 1.5rem 0; animation: fadeIn 0.5s ease; }
.end-emoji { font-size: 56px; margin-bottom: 0.8rem; }
.end-title { font-family: 'Baloo 2', cursive; font-size: 26px; font-weight: 800; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px; }
.end-score-big { font-family: 'Baloo 2', cursive; font-size: 52px; font-weight: 800; color: var(--accent); margin: 0.4rem 0; }
.end-score-sub { font-size: 13px; color: var(--muted); margin-bottom: 0.8rem; }
.end-msg { font-size: 14px; color: var(--muted); margin-bottom: 1.2rem; line-height: 1.6; }
.end-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 1.2rem; }
.end-stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px; text-align: center; }
.end-stat .v { font-family: 'Baloo 2', cursive; font-size: 20px; font-weight: 700; color: var(--accent2); }
.end-stat .l { font-size: 10px; color: var(--muted); margin-top: 2px; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
@keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }
@keyframes popIn { from { opacity: 0; transform: translateX(-50%) scale(0.8); } to { opacity: 1; transform: translateX(-50%) scale(1); } }
</style>
</head>
<body>
<div class="container" id="app"></div>

<script>

const ALL_QUESTIONS = [

  { lvl:1, topic:"Basic", r:"H₂ + O → ?", hints:{hindi:"यह पीने का पानी है!",english:"This is drinking water!",hinglish:"Yeh peene ka paani hai!",tamil:"இது குடிநீர்!",bengali:"এটি পানীয় জল!"}, ans:"H₂O", opts:["H₂O","CO₂","NaCl","O₂"] },

  { lvl:1, topic:"Basic", r:"C + O₂ → ?", hints:{hindi:"हम सांस छोड़ते समय यही निकालते हैं",english:"We exhale this gas",hinglish:"Hum saans chodne par yahi nikalte hain",tamil:"நாம் மூச்சு விடும்போது வெளியிடுகிறோம்",bengali:"আমরা শ্বাস ছাড়ার সময় এটি বের করি"}, ans:"CO₂", opts:["CO₂","H₂O","CH₄","SO₂"] },
  { lvl:1, topic:"Basic", r:"Fe + O₂ → ?", hints:{hindi:"लोहे पर पानी पड़ने पर होता है!",english:"This happens when iron meets water!",hinglish:"Lohey pe paani padne par hota hai!",tamil:"இரும்பில் நீர் படும்போது!",bengali:"লোহায় জল পড়লে হয়!"}, ans:"Fe₂O₃", opts:["Fe₂O₃","FeS","FeCl₂","FeCO₃"] },
  { lvl:1, topic:"Basic", r:"HCl + NaOH → ?", hints:{hindi:"अम्ल और क्षार मिलने पर...",english:"Acid + Base reaction",hinglish:"Acid aur base milenge toh...",tamil:"அமிலம் + காரம்",bengali:"অ্যাসিড + ক্ষার"}, ans:"NaCl + H₂O", opts:["NaCl + H₂O","Na₂O + HCl","CO₂ + H₂","NaH + Cl₂"] },

    <div class="progress-wrap">
      <div class="progress-label"><span>${Q.topic}</span><span id="pPct">${pct}%</span></div>
      <div class="progress-bg"><div class="progress-fill" id="pFill" style="width:${pct}%"></div></div>
    </div>
    <div class="q-card">
      <div class="q-tag">${L.q}</div>
      <div class="topic-badge">${Q.topic}</div>
      <div class="reaction">${Q.r}</div>
      <div class="hint-box"><strong>${L.hint}:</strong> ${Q.hints[lang]||Q.hints.hinglish}</div>
    </div>
    <div class="options" id="optGrid"></div>
    <div class="feedback" id="fb"></div>
    <button class="next-btn" id="nBtn" disabled onclick="nextQ()">${L.next}</button>`;

  answered = false;
  const grid = document.getElementById('optGrid');
  [...Q.opts].sort(()=>Math.random()-0.5).forEach(o=>{
    const b=document.createElement('button');
    b.className='opt'; b.textContent=o;
    b.onclick=()=>checkAns(o,Q.ans);
    grid.appendChild(b);
  });
  startTimer();
}

function startTimer() {
  clearInterval(timer);
  timeLeft = 20;
  updateTimer();
  timer = setInterval(()=>{
    timeLeft--;
    totalTime++;
    updateTimer();
    if(timeLeft<=0) { clearInterval(timer); timeUp(); }
  },1000);
}

function updateTimer() {
  const el = document.getElementById('timerPill');
  if(!el) return;
  el.textContent = `⏱ ${timeLeft}s`;
  el.className = timeLeft<=5 ? 'timer-pill danger' : 'timer-pill';
}

function timeUp() {
  if(answered) return;
  answered = true;
  wrong++;
  streak = 0;
  document.getElementById('sW').textContent = wrong;
  document.getElementById('sStr').textContent = streak;
  const qs = getLvlQuestions();
  const Q = qs[currentQ];
  document.querySelectorAll('.opt').forEach(b=>{
    b.onclick=null;
    if(b.textContent===Q.ans) b.classList.add('correct');
  });
  const fb=document.getElementById('fb');
  fb.textContent = '⏰ Time up! ' + LANGS[lang].wrong + Q.ans;
  fb.className = 'feedback wrong';
  document.getElementById('nBtn').disabled = false;
}

function checkAns(sel, ans) {
  if(answered) return;
  answered = true;
  clearInterval(timer);
  document.querySelectorAll('.opt').forEach(b=>{
    b.onclick=null;
    if(b.textContent===ans) b.classList.add('correct');
    else if(b.textContent===sel) b.classList.add('wrong');
  });
  const fb=document.getElementById('fb');
  const L=LANGS[lang];
  if(sel===ans) {
    correct++; streak++; if(streak>maxStreak) maxStreak=streak;
    fb.textContent = L.correct + (streak>=3 ? ` 🔥 ${streak} streak!` : '');
    fb.className = 'feedback correct';
    if(streak>=3) showStreak(streak);
  } else {
    wrong++; streak=0;
    fb.textContent = L.wrong + ans;
    fb.className = 'feedback wrong';
  }
  document.getElementById('sC').textContent=correct;
  document.getElementById('sW').textContent=wrong;
  document.getElementById('sStr').textContent=streak;
  document.getElementById('nBtn').disabled=false;
}

function showStreak(n) {
  const el=document.getElementById('streakPopup');
  el.textContent = `🔥 ${n}x Streak!`;
  el.style.display='block';
  setTimeout(()=>el.style.display='none',1800);
}

function nextQ() {
  currentQ++;
  renderGame();
}

function renderEnd() {
  const total=getTotalQ();
  const pct=Math.round(correct/total*100);
  const mins=Math.floor(totalTime/60), secs=totalTime%60;
  let emoji,msg;
  if(pct>=90){emoji='🏆';msg='Waah bhai! Chemistry ke ustaad ho! NEET/JEE pakka!';}
  else if(pct>=70){emoji='🥳';msg='Bahut accha! Thoda practice aur karo!';}
  else if(pct>=50){emoji='💪';msg='Accha kiya! Aur practice karte raho!';}
  else{emoji='📚';msg='Koi baat nahi! Phir koshish karo!';}

  document.getElementById('app').innerHTML = `
    <div class="end-screen">
      <div class="end-emoji">${emoji}</div>
      <div class="end-title">Game Khatam!</div>
      <div class="end-score-big">${correct}/${total}</div>
      <div class="end-score-sub">${pct}% sahi jawab</div>
      <div class="end-stats">
        <div class="end-stat"><div class="v">${maxStreak}</div><div class="l">Max Streak 🔥</div></div>
        <div class="end-stat"><div class="v">${mins}:${secs<10?'0'+secs:secs}</div><div class="l">Time ⏱</div></div>
        <div class="end-stat"><div class="v">${wrong}</div><div class="l">Galat ✗</div></div>
      </div>
      <div class="end-msg">${msg}</div>
      <div class="lb-screen">
        <div class="lb-title">🏅 Leaderboard</div>
        <div class="lb-input-row">
          <input class="lb-input" id="nameInput" placeholder="Apna naam likho..." maxlength="20"/>
          <button class="lb-save-btn" onclick="saveScore(${correct},${pct})">Save</button>
        </div>
        ${renderLB()}
      </div>
      <button class="play-again-btn" onclick="renderLangScreen()">Phir se Khelein 🔄</button>
    </div>`;
}

function renderLB() {
  if(!leaderboard.length) return '<p style="text-align:center;color:var(--muted);font-size:13px;">Abhi koi score nahi — pehle save karo!</p>';
  const sorted=[...leaderboard].sort((a,b)=>b.score-a.score).slice(0,10);
  const medals=['🥇','🥈','🥉'];
  return `<table class="lb-table">
    <tr><th>#</th><th>Naam</th><th>Score</th><th>%</th></tr>
    ${sorted.map((e,i)=>`<tr><td class="lb-rank">${medals[i]||i+1}</td><td>${e.name}</td><td>${e.score}</td><td>${e.pct}%</td></tr>`).join('')}
  </table>`;
}

function saveScore(score,pct) {
  const name=document.getElementById('nameInput').value.trim()||'Anonymous';
  leaderboard.push({name,score,pct,date:new Date().toLocaleDateString()});
  leaderboard.sort((a,b)=>b.score-a.score);
  if(leaderboard.length>20) leaderboard=leaderboard.slice(0,20);
  localStorage.setItem('chemGuru_lb',JSON.stringify(leaderboard));
  renderEnd();
}

renderLangScreen();
</script>
</body>
</html>
